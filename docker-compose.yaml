services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    # Internal only - not exposed to host by default.
    # Uncomment to access from your machine:
    # ports:
    #   - "27017:27017"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      MONGODB_URI: mongodb://mongo:27017
      JWT_SECRET: ${JWT_SECRET:-secret123}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      PORT: 3001
    depends_on:
      - mongo
    # Backend not exposed directly; reached through nginx proxy.

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  mongo_data:
