services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      MONGODB_URI: mongodb://mongo:27017
      JWT_SECRET: ${JWT_SECRET:-secret123}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      PORT: 3001
    expose:
      - "3001"
    depends_on:
      - mongo

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    # On Coolify the reverse proxy (Traefik) reaches the container on its
    # internal port. Locally, override with: docker compose -f docker-compose.yaml -f docker-compose.local.yaml up
    expose:
      - "80"
    depends_on:
      - backend

volumes:
  mongo_data:
